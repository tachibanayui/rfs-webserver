name: PR

on:
    pull_request:

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable

            - name: Cache Cargo dependencies
              uses: Swatinem/rust-cache@v2

            - name: Build
              run: cargo build --locked

            - name: Test
              run: cargo test --locked
    bench:
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - name: Checkout PR
              uses: actions/checkout@v6
            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
            - name: Cache Cargo dependencies
              uses: Swatinem/rust-cache@v2
            - name: Setup K6
              uses: grafana/setup-k6-action@v1
            - name: Build and Copy PR
              run: |
                  mkdir -p ../bench
                  cargo build --locked --release
                  cp target/release/rfs-webserver ../bench/bench-pr
                  cp stress.js ../bench/stress-pr.js
            - name: Checkout master
              uses: actions/checkout@v6
              with:
                  ref: "master"
            - name: Build and Copy master
              run: |
                  cargo build --locked --release
                  cp target/release/rfs-webserver ../bench/bench-master
                  cp stress.js ../bench/stress-master.js
                  cp -r ../bench ./bench
            - name: Copy sample real-path
              run: |
                  cp -r ./target/release ./real-path
            - name: Start PR
              run: |
                  ./bench/bench-pr --seed 12345 &
                  sleep 5
            - name: Run test on PR
              uses: grafana/run-k6-action@v1
              with:
                  path: ./bench/stress-pr.js
            - name: Stop PR
              run: killall bench-pr
            - name: Copy result file for PR
              run: |
                  mv -f ./stress-result.md ./pr-stress-result.md
            - name: Start master
              run: |
                  ./bench/bench-master --seed 12345 &
                  sleep 5
            - name: Run test on master
              uses: grafana/run-k6-action@v1
              with:
                  path: ./bench/stress-master.js
            - name: Stop master
              run: killall bench-master
            - name: Post k6 Results to PR
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const script = require('./.github/workflows/post-bench.js')
                      await script({ github, context })
