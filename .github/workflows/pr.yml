name: PR

on:
    pull_request:

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable

            - name: Cache Cargo dependencies
              uses: Swatinem/rust-cache@v2

            - name: Build
              run: cargo build --locked

            - name: Test
              run: cargo test --locked
