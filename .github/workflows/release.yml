name: Release

on:
    release:
        types:
            - published

jobs:
    validate:
        runs-on: ubuntu-latest

        outputs:
            version: ${{ steps.version.outputs.version }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable

            - name: Cache Cargo dependencies
              uses: Swatinem/rust-cache@v2

            - name: Read crate version
              id: version
              shell: bash
              run: |
                  version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
                  echo "version=$version" >> "$GITHUB_OUTPUT"

            - name: Validate release tag matches Cargo.toml
              shell: bash
              run: |
                  tag='${{ github.event.release.tag_name }}'
                  version='${{ steps.version.outputs.version }}'
                  normalized_tag="${tag#v}"

                  if [ "$normalized_tag" != "$version" ]; then
                    echo "Release tag $tag does not match Cargo.toml version $version"
                    exit 1
                  fi

            - name: Build and test
              run: |
                  cargo build --locked --release
                  cargo test --locked

    publish-crates:
        runs-on: ubuntu-latest
        needs: validate

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable

            - name: Cache Cargo dependencies
              uses: Swatinem/rust-cache@v2

            - name: Publish to crates.io
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
              run: cargo publish --locked

    publish-docker:
        runs-on: ubuntu-latest
        needs: validate

        env:
            IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/rfs-webserver

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable

            - name: Cache Cargo dependencies
              uses: Swatinem/rust-cache@v2

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}
                      ${{ env.IMAGE_NAME }}:latest
